name: Deployment

on:
  push:
    branches: [ main ]

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: pilotnow
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.24.0 --activate

      - name: Prepare environment file
        env:
          PILOTNOW_ENV_FILE: ${{ secrets.PILOTNOW_ENV_FILE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          PILOTNOW_WEB_API_URL: ${{ secrets.PILOTNOW_WEB_API_URL }}
          PILOTNOW_API_URL: ${{ secrets.PILOTNOW_API_URL }}
          PILOTNOW_AGENT_TOKEN: ${{ secrets.PILOTNOW_AGENT_TOKEN }}
          PILOTNOW_ADMIN_EMAIL: ${{ secrets.PILOTNOW_ADMIN_EMAIL }}
          PILOTNOW_ADMIN_PASSWORD: ${{ secrets.PILOTNOW_ADMIN_PASSWORD }}
          PILOTNOW_ADMIN_NAME: ${{ secrets.PILOTNOW_ADMIN_NAME }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          API_PORT: ${{ vars.API_PORT }}
        run: |
          if [ -n "$PILOTNOW_ENV_FILE" ]; then
            printf '%s\n' "$PILOTNOW_ENV_FILE" > .env
          else
            if [ -z "$DATABASE_URL" ]; then
              echo "Missing required GitHub secret: DATABASE_URL"
              exit 1
            fi

            {
              printf 'DATABASE_URL=%s\n' "$DATABASE_URL"
              printf 'API_PORT=%s\n' "${API_PORT:-4000}"
              printf 'NEXT_PUBLIC_API_URL=%s\n' "${NEXT_PUBLIC_API_URL:-http://localhost:4000}"
              printf 'PILOTNOW_WEB_API_URL=%s\n' "${PILOTNOW_WEB_API_URL:-${PILOTNOW_API_URL:-http://localhost:4000}}"
              printf 'PILOTNOW_API_URL=%s\n' "${PILOTNOW_API_URL:-http://localhost:4000}"
              printf 'PILOTNOW_AGENT_TOKEN=%s\n' "$PILOTNOW_AGENT_TOKEN"
              printf 'PILOTNOW_ADMIN_EMAIL=%s\n' "$PILOTNOW_ADMIN_EMAIL"
              printf 'PILOTNOW_ADMIN_PASSWORD=%s\n' "$PILOTNOW_ADMIN_PASSWORD"
              printf 'PILOTNOW_ADMIN_NAME=%s\n' "${PILOTNOW_ADMIN_NAME:-PilotNow Admin}"
              printf 'SMTP_HOST=%s\n' "${SMTP_HOST:-smtp.resend.com}"
              printf 'SMTP_PORT=%s\n' "${SMTP_PORT:-465}"
              printf 'SMTP_USER=%s\n' "${SMTP_USER:-resend}"
              printf 'SMTP_PASS=%s\n' "$SMTP_PASS"
              printf 'SMTP_FROM=%s\n' "$SMTP_FROM"
              printf 'SMTP_SECURE=%s\n' "${SMTP_SECURE:-true}"
            } > .env
          fi

          if [ ! -s .env ]; then
            echo "Generated .env is empty"
            exit 1
          fi

          chmod 600 .env

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install PM2
        run: |
          npm install -g pm2
          pm2 --version

      - name: Run database migrations
        run: |
          set -a
          source .env
          set +a
          pnpm --filter @pilotnow/db db:migrate

      - name: Build apps
        run: |
          set -a
          source .env
          set +a
          pnpm run build

      - name: Check PM2 status before
        run: pm2 status || true

      - name: Restart services
        run: pm2 startOrRestart ecosystem.config.cjs --update-env

      - name: Sync PM2
        run: pm2 save
