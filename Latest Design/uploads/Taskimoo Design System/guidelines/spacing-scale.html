<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base — --space-1 → --space-12" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--bg-0); display: flex; flex-direction: column; gap: 9px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .bar { background: var(--red-500); height: 14px; border-radius: 2px; }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-1); width: 78px; }
  .val { font-family: var(--font-mono); font-size: 9.5px; color: var(--fg-3); }
</style>
</head>
<body>
  <div class="row"><span class="name">--space-1</span><span class="bar" style="width:4px"></span><span class="val">4px</span></div>
  <div class="row"><span class="name">--space-2</span><span class="bar" style="width:8px"></span><span class="val">8px</span></div>
  <div class="row"><span class="name">--space-3</span><span class="bar" style="width:12px"></span><span class="val">12px</span></div>
  <div class="row"><span class="name">--space-4</span><span class="bar" style="width:16px"></span><span class="val">16px</span></div>
  <div class="row"><span class="name">--space-6</span><span class="bar" style="width:24px"></span><span class="val">24px</span></div>
  <div class="row"><span class="name">--space-8</span><span class="bar" style="width:32px"></span><span class="val">32px</span></div>
  <div class="row"><span class="name">--space-12</span><span class="bar" style="width:48px"></span><span class="val">48px</span></div>
</body>
</html>
