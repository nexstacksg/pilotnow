<!-- @dsCard group="Colors" viewport="700x150" name="Ink / Foreground" subtitle="Text ramp from near-black to faintest" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-0); }
  .row { display: flex; gap: 0; border: 1px solid var(--border-0); border-radius: var(--radius-md); overflow: hidden; }
  .sw { flex: 1; height: 88px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; }
  .name { font-family: var(--font-mono); font-size: 10px; font-weight: 600; }
  .val { font-family: var(--font-mono); font-size: 9.5px; opacity: 0.7; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--fg-0); color:#fff"><span class="name">--fg-0</span><span class="val">#0A0A0A</span></div>
    <div class="sw" style="background:var(--fg-1); color:#fff"><span class="name">--fg-1</span><span class="val">#262626</span></div>
    <div class="sw" style="background:var(--fg-2); color:#fff"><span class="name">--fg-2</span><span class="val">#525252</span></div>
    <div class="sw" style="background:var(--fg-3); color:#0A0A0A"><span class="name">--fg-3</span><span class="val">#A3A3A3</span></div>
    <div class="sw" style="background:var(--fg-4); color:#0A0A0A"><span class="name">--fg-4</span><span class="val">#D4D4D4</span></div>
  </div>
</body>
</html>
