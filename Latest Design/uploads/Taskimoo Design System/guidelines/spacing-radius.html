<!-- @dsCard group="Spacing" viewport="700x150" name="Radius" subtitle="Subtle corners — 2px to pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--bg-0); display: flex; gap: 18px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 64px; height: 64px; background: var(--bg-2); border: 1px solid var(--border-1); }
  .name { font-family: var(--font-mono); font-size: 9.5px; color: var(--fg-1); }
  .pill { width: 96px; height: 30px; }
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="name">xs · 2</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="name">sm · 4</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="name">md · 6</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="name">lg · 10</span></div>
  <div class="item"><div class="box pill" style="border-radius:var(--radius-pill)"></div><span class="name">pill · 999</span></div>
</body>
</html>
