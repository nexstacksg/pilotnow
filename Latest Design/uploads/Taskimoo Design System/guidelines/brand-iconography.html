<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--bg-0); }
  .row { display: flex; gap: 22px; align-items: center; flex-wrap: wrap; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 7px; color: var(--fg-1); }
  .ic svg { width: 22px; height: 22px; }
  .ic span { font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); }
  .note { margin-top: 14px; font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); }
</style>
</head>
<body>
  <div class="row" id="icons"></div>
  <div class="note">lucide.dev · stroke-width 1.6 · round caps · 14–16px in UI · no emoji (except ★ on AI avatars)</div>

    const wrap = document.getElementById('icons');
    Object.entries(ICONS).forEach(([name, inner]) => {
      const el = document.createElement('div');
      el.className = 'ic';
      el.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${inner}</svg><span>${name}</span>`;
