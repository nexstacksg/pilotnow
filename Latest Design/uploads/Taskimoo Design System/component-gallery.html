<!-- @dsCard group="Components" viewport="1180x820" name="Component Gallery" subtitle="All Taskimoo components, light + dark" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Taskimoo — Component Gallery</title>
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg-1); color: var(--fg-0); }

  .topbar {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; gap: 14px;
    height: 56px; padding: 0 24px;
    background: var(--bg-0); border-bottom: 1px solid var(--border-0);
  }
  .brand { display: flex; align-items: center; gap: 9px; }
  .brand .mark { width: 26px; height: 26px; border-radius: 6px; background: var(--brand-ink); display: flex; align-items: center; justify-content: center; }
  .brand .mark svg { width: 15px; height: 15px; }
  .brand .name { font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 0; }
  .brand .name .dot { color: var(--brand-orange); }
  .topbar .eyebrow { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-3); border-left: 1px solid var(--border-0); padding-left: 14px; }
  .topbar .spacer { flex: 1; }

  .theme-switch { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-2); }
  .theme-switch button {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 11px; border: 1px solid var(--border-1); border-radius: var(--radius-pill);
    background: var(--bg-0); color: var(--fg-1); cursor: pointer; font: inherit;
    transition: all var(--dur-fast) var(--ease-out);
  }
  .theme-switch button:hover { background: var(--bg-2); }
  .theme-switch button svg { width: 13px; height: 13px; }

  .wrap { max-width: 1140px; margin: 0 auto; padding: 32px 24px 80px; }
  .lede { margin: 0 0 36px; }
  .lede h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; margin: 6px 0 8px; }
  .lede p { font-size: 14px; color: var(--fg-2); max-width: 62ch; line-height: 1.55; margin: 0; }
  .lede .kick { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--red-600); }

  section.block { margin-bottom: 40px; }
  .block-head { display: flex; align-items: baseline; gap: 12px; padding-bottom: 12px; margin-bottom: 18px; border-bottom: 1px solid var(--border-1); }
  .block-head h2 { font-size: 13px; font-weight: 700; margin: 0; text-transform: uppercase; letter-spacing: 0.04em; }
  .block-head .num { font-family: var(--font-mono); font-size: 11px; color: var(--red-500); }
  .block-head .desc { font-size: 12px; color: var(--fg-3); margin-left: auto; }

  .grid { display: grid; gap: 16px; }
  .cols-2 { grid-template-columns: 1fr 1fr; }
  .cols-3 { grid-template-columns: repeat(3, 1fr); }

  .demo { background: var(--bg-0); border: 1px solid var(--border-0); border-radius: var(--radius-md); padding: 18px; display: flex; flex-direction: column; gap: 14px; }
  .demo .cap { font-family: var(--font-mono); font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-3); }
  .demo .rowflex { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .demo .colflex { display: flex; flex-direction: column; gap: 12px; }

  @media (max-width: 880px) { .cols-2, .cols-3 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const DS = window.TaskimooDesignSystem_da633e;
  const {
    Button, Pill, Chip, Avatar, SectionCard, KPIStrip, TaskCard,
    Input, Textarea, Select, Checkbox, Toggle,
    Tabs, SegmentedControl, Breadcrumb,
    DualStatus, ProgressBar, DataTable,
    Banner, Toast, EmptyState, Modal,
  } = DS;

  // --- inline Lucide-style icons (1.6 stroke) ---
  const I = (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p} />;
  const Plus = () => <I><path d="M12 5v14M5 12h14"/></I>;
  const Search = () => <I><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></I>;
  const Hash = () => <I><path d="M4 9h16M4 15h16M10 3 8 21M16 3l-2 18"/></I>;
  const Sun = () => <I><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></I>;
  const Moon = () => <I><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></I>;
  const Alert = () => <I><path d="m21.7 18-8-14a2 2 0 0 0-3.4 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.7-3Z"/><path d="M12 9v4M12 17h.01"/></I>;
  const Sparkle = () => <I><path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M18.4 5.6l-2.8 2.8M8.4 15.6l-2.8 2.8"/></I>;
  const Check = () => <I><path d="M20 6 9 17l-5-5"/></I>;
  const Inbox = () => <I><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.4 5.1 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.4-6.9A2 2 0 0 0 16.8 4H7.2a2 2 0 0 0-1.8 1.1Z"/></I>;
  const Columns = () => <I><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="18" rx="1"/></I>;
  const RowsIc = () => <I><rect x="3" y="3" width="18" height="7" rx="1"/><rect x="3" y="14" width="18" height="7" rx="1"/></I>;
  const Mark = () => <svg viewBox="0 0 24 24" fill="none" stroke="#FF7A1A" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M5 13l4 4L19 7"/></svg>;

  const COMM = ['Idea','Bidding','Quoted','Won','Invoiced','Paid','Closed'];
  const DELI = ['Draft','Planned','Ready','In progress','In review','QA/QC','UAT','Released','Closed'];

  function Block({ n, title, desc, children, cols }) {
    return (
      <section className="block">
        <div className="block-head">
          <span className="num">{n}</span>
          <h2>{title}</h2>
          {desc ? <span className="desc">{desc}</span> : null}
        </div>
        <div className={`grid ${cols || ''}`}>{children}</div>
      </section>
    );
  }
  const Demo = ({ cap, children, col }) => (
    <div className="demo">
      <span className="cap">{cap}</span>
      <div className={col ? 'colflex' : 'rowflex'}>{children}</div>
    </div>
  );

  function Gallery() {
    const [theme, setTheme] = React.useState('light');
    const [open, setOpen] = React.useState(false);
    React.useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);

    return (
      <React.Fragment>
        <div className="topbar">
          <div className="brand">
            <span className="mark"><Mark/></span>
            <span className="name">TASKIMOO<span className="dot">.</span></span>
          </div>
          <span className="eyebrow">Component Gallery</span>
          <span className="spacer" />
          <div className="theme-switch">
            <span>{theme === 'dark' ? 'Dark' : 'Light'}</span>
            <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}>
              {theme === 'dark' ? <Sun/> : <Moon/>}
              Switch theme
            </button>
          </div>
        </div>

        <div className="wrap">
          <div className="lede">
            <div className="kick">Sharp &amp; editorial · B&amp;W + functional red</div>
            <h1>Components</h1>
            <p>The Taskimoo primitives — core, forms, navigation, data and feedback — composed here in one place. Every surface is token-driven, so the whole gallery flips between light and dark from the switch above. Red stays the single live signal across both themes.</p>
          </div>

          <Block n="01" title="Core" desc="Actions, status, identity" cols="cols-3">
            <Demo cap="Button">
              <Button variant="primary" icon={<Plus/>}>New task</Button>
              <Button variant="red">Block</Button>
              <Button variant="secondary">Cancel</Button>
              <Button variant="ghost">Filter</Button>
            </Demo>
            <Demo cap="Pill / Chip">
              <Pill dot="var(--status-progress)">In progress</Pill>
              <Pill tone="green" dot="var(--status-done)">Done</Pill>
              <Pill tone="red" dot="var(--red-500)">Urgent</Pill>
              <Chip red>Blocked</Chip>
              <Chip mono>main</Chip>
            </Demo>
            <Demo cap="Avatar">
              <Avatar name="Maya Chen" />
              <Avatar name="Lin Park" tone="dark" />
              <Avatar initials="KL" tone="red" />
              <Avatar ai name="Agent" />
            </Demo>
          </Block>

          <Block n="02" title="Forms" desc="Field primitives" cols="cols-2">
            <Demo cap="Text · Select · Textarea" col>
              <Input label="Project name" placeholder="e.g. Mercury" />
              <Input label="Email" type="email" defaultValue="bad@" invalid hint="Enter a valid address" icon={<Hash/>} />
              <Select label="Assignee" placeholder="Unassigned" options={['Maya Chen','Lin Park','Diego R.']} />
              <Textarea label="Description" rows={2} placeholder="What needs to ship…" />
            </Demo>
            <Demo cap="Checkbox · Radio · Toggle" col>
              <Checkbox label="Chargeable" defaultChecked />
              <Checkbox label="Block on failing tests" description="Pause delivery until QA passes" red defaultChecked />
              <div className="rowflex">
                <Checkbox type="radio" name="r" value="ba" label="BA" defaultChecked />
                <Checkbox type="radio" name="r" value="dev" label="Developer" />
              </div>
              <Toggle label="Notify on status change" defaultChecked />
              <Toggle label="Pause delivery" red defaultChecked />
            </Demo>
          </Block>

          <Block n="03" title="Navigation" desc="Wayfinding" cols="cols-2">
            <Demo cap="Breadcrumb · Tabs" col>
              <Breadcrumb items={[{ label: 'Projects', href: '#' }, { label: 'Mercury', href: '#' }, 'Delivery board']} />
              <Tabs defaultValue="board" items={[
                { value: 'board', label: 'Board', count: 24 },
                { value: 'list', label: 'List' },
                { value: 'timeline', label: 'Timeline' },
              ]} />
            </Demo>
            <Demo cap="Segmented control">
              <SegmentedControl defaultValue="board" options={[
                { value: 'board', label: 'Board' }, { value: 'list', label: 'List' }, { value: 'cal', label: 'Calendar' },
              ]} />
              <SegmentedControl size="sm" defaultValue="kanban" options={[
                { value: 'kanban', icon: <Columns/> }, { value: 'rows', icon: <RowsIc/> },
              ]} />
            </Demo>
          </Block>

          <Block n="04" title="Data" desc="The signature parallel-status component">
            <Demo cap="DualStatus — commercial truth vs delivery truth">
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, width: '100%' }}>
                <DualStatus commercial={{ stages: COMM, current: 4 }} delivery={{ stages: DELI, current: 3, tone: 'risk' }} />
                <DualStatus commercial={{ stages: COMM, current: 5 }} delivery={{ stages: DELI, current: 7 }} />
              </div>
            </Demo>
            <div className="grid cols-2">
              <Demo cap="ProgressBar" col>
                <ProgressBar value={5} max={8} label="Milestones" showValue />
                <ProgressBar value={31} max={48} tone="green" label="Collected" showValue valueText="$31k / $48k" />
                <ProgressBar value={2} max={10} tone="red" label="Overdue" showValue size="sm" />
              </Demo>
              <Demo cap="TaskCard" col>
                <TaskCard id="TASK-148" title="Wire finance table to invoices API" tags={[{label:'API'},{label:'blocked',red:true}]} statusLabel="In progress" statusColor="var(--status-progress)" due="May 24" assignee="MC" selected />
              </Demo>
            </div>
            <Demo cap="DataTable" col>
              <DataTable
                rowKey="id" selectedKey="INV-2210"
                columns={[
                  { key: 'id', header: 'Invoice', mono: true },
                  { key: 'client', header: 'Client', strong: true },
                  { key: 'delivery', header: 'Delivery', render: (v) => <Pill dot={v.dot}>{v.label}</Pill> },
                  { key: 'amount', header: 'Amount', align: 'right', mono: true },
                  { key: 'status', header: 'Commercial', render: (v) => <Pill tone={v.tone} dot={v.dot}>{v.label}</Pill> },
                ]}
                rows={[
                  { id: 'INV-2210', client: 'Acme Corp', delivery: { label: 'Released', dot: 'var(--status-done)' }, amount: '$31,000', status: { label: 'Paid', tone: 'green' } },
                  { id: 'INV-2211', client: 'Globex', delivery: { label: 'In progress', dot: 'var(--status-progress)' }, amount: '$12,400', status: { label: 'Invoiced', tone: 'blue' } },
                  { id: 'INV-2208', client: 'Initech', delivery: { label: 'Blocked', dot: 'var(--red-500)' }, amount: '$7,000', status: { label: 'Overdue', tone: 'red', dot: 'var(--red-500)' } },
                ]}
              />
            </Demo>
          </Block>

          <Block n="05" title="Feedback" desc="Messaging & overlays" cols="cols-2">
            <Demo cap="Banner" col>
              <Banner tone="danger" title="Payment overdue" icon={<Alert/>} actions={<Button size="sm" variant="red">Chase invoice</Button>} onDismiss={()=>{}}>
                INV-2208 is 12 days past due.
              </Banner>
              <Banner tone="ai" title="Delivery agent" icon={<Sparkle/>} onDismiss={()=>{}}>
                3 tasks look ready to move to QA/QC.
              </Banner>
            </Demo>
            <Demo cap="Toast" col>
              <Toast tone="success" icon={<Check/>} title="Task moved to QA/QC" action={<Button size="sm" variant="ghost">Undo</Button>} onDismiss={()=>{}} />
              <Toast tone="danger" icon={<Alert/>} title="Couldn't sync with GitHub" message="Retry in a moment." onDismiss={()=>{}} />
            </Demo>
            <Demo cap="EmptyState">
              <div style={{ width: '100%' }}>
                <EmptyState icon={<Inbox/>} title="No work items" description="Nothing assigned to you in this sprint yet." action={<Button variant="primary" icon={<Plus/>}>New task</Button>} compact />
              </div>
            </Demo>
            <Demo cap="Modal">
              <Button variant="secondary" onClick={()=>setOpen(true)}>Open modal</Button>
              <Modal open={open} onClose={()=>setOpen(false)} eyebrow="New work item" title="Create task"
                footer={<React.Fragment><Button variant="ghost" onClick={()=>setOpen(false)}>Cancel</Button><Button variant="primary" onClick={()=>setOpen(false)}>Create</Button></React.Fragment>}>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  <Input label="Title" placeholder="What needs to ship…" />
                  <Select label="Delivery status" defaultValue="planned" options={[{value:'planned',label:'Planned'},{value:'ready',label:'Ready'}]} />
                </div>
              </Modal>
            </Demo>
          </Block>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Gallery/>);
</script>
</body>
</html>
