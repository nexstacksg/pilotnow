<!-- @dsCard group="Components" viewport="720x340" name="Navigation — Tabs · SegmentedControl · Breadcrumb" subtitle="Wayfinding with light/dark toggle" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 22px; background: var(--bg-0); }
  #root { display: flex; flex-direction: column; gap: 22px; max-width: 660px; }
  .grp { display: flex; flex-direction: column; gap: 10px; }
  .lbl { font-family: var(--font-mono); font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-3); }
  .row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .toggle-theme { position: fixed; top: 14px; right: 16px; z-index: 5; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; padding: 5px 10px; border: 1px solid var(--border-1); border-radius: var(--radius-sm); background: var(--bg-0); color: var(--fg-1); cursor: pointer; }
</style>
</head>
<body>
<button class="toggle-theme" id="tt">◑ Theme</button>
<div id="root"></div>
<script type="text/babel">
  const { Tabs, SegmentedControl, Breadcrumb } = window.TaskimooDesignSystem_da633e;
  const Columns = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="18" rx="1"/></svg>);
  const Rows = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="7" rx="1"/><rect x="3" y="14" width="18" height="7" rx="1"/></svg>);

  function Demo() {
    return (
      <React.Fragment>
        <div className="grp">
          <span className="lbl">Breadcrumb</span>
          <Breadcrumb items={[{ label: 'Projects', href: '#' }, { label: 'Mercury', href: '#' }, 'Delivery board']} />
        </div>
        <div className="grp">
          <span className="lbl">Tabs</span>
          <Tabs defaultValue="board" items={[
            { value: 'board', label: 'Board', count: 24 },
            { value: 'list', label: 'List' },
            { value: 'timeline', label: 'Timeline' },
            { value: 'finance', label: 'Finance', count: 3 },
          ]} />
        </div>
        <div className="grp">
          <span className="lbl">Segmented control</span>
          <div className="row">
            <SegmentedControl defaultValue="board" options={[
              { value: 'board', label: 'Board' },
              { value: 'list', label: 'List' },
              { value: 'cal', label: 'Calendar' },
            ]} />
            <SegmentedControl size="sm" defaultValue="kanban" options={[
              { value: 'kanban', icon: <Columns/> },
              { value: 'rows', icon: <Rows/> },
            ]} />
          </div>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  document.getElementById('tt').onclick = () => {
    const r = document.documentElement;
    r.setAttribute('data-theme', r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  };
</script>
</body>
</html>
