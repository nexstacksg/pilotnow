<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 22px; background: var(--bg-0); }
  .grp { display: flex; flex-direction: column; gap: 9px; margin-bottom: 18px; }
  .lbl { font-family: var(--font-mono); font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-3); }
  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, Pill, Chip, Avatar } = window.TaskimooDesignSystem_da633e;
  const Plus = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14"/></svg>);

  function Demo() {
    return (
      <React.Fragment>
        <div className="grp">
          <span className="lbl">Button — variants</span>
          <div className="row">
            <Button variant="primary" icon={<Plus/>}>New task</Button>
            <Button variant="red">Block</Button>
            <Button variant="secondary">Cancel</Button>
            <Button variant="ghost">Filter</Button>
            <Button variant="secondary" disabled>Disabled</Button>
            <Button variant="ghost" icon={<Plus/>} title="Add" />
          </div>
        </div>
        <div className="grp">
          <span className="lbl">Pill — status</span>
          <div className="row">
            <Pill dot="var(--status-backlog)">Backlog</Pill>
            <Pill dot="var(--status-progress)">In progress</Pill>
            <Pill tone="green" dot="var(--status-done)">Done</Pill>
            <Pill tone="amber">UAT</Pill>
            <Pill tone="red" dot="var(--red-500)">Urgent</Pill>
            <Pill tone="blue" mono>REQ-12</Pill>
          </div>
        </div>
        <div className="grp">
          <span className="lbl">Chip — tags &amp; filters</span>
          <div className="row">
            <Chip dot="var(--status-done)">Released</Chip>
            <Chip red>Blocked</Chip>
            <Chip mono>main</Chip>
            <Chip>Chargeable</Chip>
          </div>
        </div>
        <div className="grp">
          <span className="lbl">Avatar — human &amp; agent</span>
          <div className="row">
            <Avatar name="Maya Chen" />
            <Avatar name="Lin Park" tone="dark" />
            <Avatar initials="KL" tone="red" />
            <Avatar name="Diego" size="sm" />
            <Avatar ai name="Delivery Agent" />
          </div>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
