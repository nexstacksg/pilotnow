<!-- @dsCard group="Components" viewport="760x520" name="Data — DualStatus · ProgressBar · DataTable" subtitle="The signature parallel-status component, with light/dark toggle" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 22px; background: var(--bg-1); }
  #root { display: flex; flex-direction: column; gap: 16px; max-width: 700px; }
  .lbl { font-family: var(--font-mono); font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-3); margin-bottom: 8px; }
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .toggle-theme { position: fixed; top: 14px; right: 16px; z-index: 5; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; padding: 5px 10px; border: 1px solid var(--border-1); border-radius: var(--radius-sm); background: var(--bg-0); color: var(--fg-1); cursor: pointer; }
</style>
</head>
<body>
<button class="toggle-theme" id="tt">◑ Theme</button>
<div id="root"></div>
<script type="text/babel">
  const { DualStatus, ProgressBar, DataTable, Pill } = window.TaskimooDesignSystem_da633e;
  const COMM = ['Idea','Bidding','Quoted','Won','Invoiced','Paid','Closed'];
  const DELI = ['Draft','Planned','Ready','In progress','In review','QA/QC','UAT','Released','Closed'];

  function Demo() {
    return (
      <React.Fragment>
        <div>
          <div className="lbl">DualStatus — commercial truth vs delivery truth (flagship)</div>
          <div className="two">
            <DualStatus commercial={{ stages: COMM, current: 4 }} delivery={{ stages: DELI, current: 3, tone: 'risk' }} />
            <DualStatus commercial={{ stages: COMM, current: 5 }} delivery={{ stages: DELI, current: 7 }} />
          </div>
        </div>
        <div>
          <div className="lbl">DualStatus — compact (for rows &amp; tables)</div>
          <DualStatus compact commercial={{ stages: COMM, current: 2 }} delivery={{ stages: DELI, current: 3, tone: 'risk' }} />
        </div>
        <div>
          <div className="lbl">ProgressBar</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12, background: 'var(--bg-0)', border: '1px solid var(--border-0)', borderRadius: 'var(--radius-md)', padding: 14 }}>
            <ProgressBar value={5} max={8} label="Milestones" showValue />
            <ProgressBar value={31} max={48} tone="green" label="Collected" showValue valueText="$31k / $48k" />
            <ProgressBar value={2} max={10} tone="red" label="Overdue tasks" showValue size="sm" />
          </div>
        </div>
        <div>
          <div className="lbl">DataTable</div>
          <DataTable
            rowKey="id"
            selectedKey="INV-2210"
            columns={[
              { key: 'id', header: 'Invoice', mono: true },
              { key: 'client', header: 'Client', strong: true },
              { key: 'amount', header: 'Amount', align: 'right', mono: true },
              { key: 'status', header: 'Status', render: (v) => <Pill tone={v.tone} dot={v.dot}>{v.label}</Pill> },
            ]}
            rows={[
              { id: 'INV-2210', client: 'Acme Corp', amount: '$31,000', status: { label: 'Paid', tone: 'green' } },
              { id: 'INV-2211', client: 'Globex', amount: '$12,400', status: { label: 'Sent', tone: 'blue' } },
              { id: 'INV-2208', client: 'Initech', amount: '$7,000', status: { label: 'Overdue', tone: 'red', dot: 'var(--red-500)' } },
            ]}
          />
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  document.getElementById('tt').onclick = () => {
    const r = document.documentElement;
    r.setAttribute('data-theme', r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  };
</script>
</body>
</html>
