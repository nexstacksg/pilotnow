<!-- @dsCard group="Taskimoo Web" viewport="1320x840" name="Taskimoo — Delivery OS" subtitle="Interactive: sign in → dashboard → delivery board → finance" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskimoo — Delivery OS</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg-1); }
  #root { height: 100vh; }
  .tk-app { display: grid; grid-template-columns: 220px 1fr; height: 100vh; background: var(--bg-1); }
  .tk-app .main { display: flex; flex-direction: column; min-width: 0; background: var(--bg-0); overflow: hidden; }
  .tk-app .main > .page, .tk-app .main > .board { overflow-y: auto; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="login.jsx"></script>
<script type="text/babel" src="screen_dashboard.jsx"></script>
<script type="text/babel" src="screen_delivery.jsx"></script>
<script type="text/babel" src="screen_finance.jsx"></script>
<script type="text/babel">
  const CRUMBS = {
    dashboard: ['Dashboard'],
    'my-tasks': ['My tasks'],
    delivery: ['Projects', 'Delivery · Mercury'],
    finance: ['Finance'],
    team: ['Team'],
    changelog: ['Changelog'],
    settings: ['Settings'],
  };

  function App() {
    const [authed, setAuthed] = React.useState(false);
    const [nav, setNav] = React.useState('dashboard');
    const [theme, setTheme] = React.useState('light');

    React.useEffect(() => {
      document.documentElement.setAttribute('data-theme', theme);
    }, [theme]);

    if (!authed) return <window.TkLogin onSignIn={() => setAuthed(true)} />;

    const { Sidebar, Topbar } = window.TkShell;
    let screen;
    if (nav === 'dashboard') screen = <window.TkDashboard />;
    else if (nav === 'delivery') screen = <window.TkDelivery />;
    else if (nav === 'finance') screen = <window.TkFinance />;
    else screen = (
      <div className="page"><div className="empty"><window.TkIcon name="circle" size={22} /><span style={{ fontWeight: 600, color: 'var(--fg-1)' }}>{CRUMBS[nav][0]}</span><span className="mono-meta">Screen not included in this kit</span></div></div>
    );

    return (
      <div className="tk-app">
        <Sidebar active={nav} onNavigate={setNav} />
        <div className="main">
          <Topbar crumbs={CRUMBS[nav]} onSignOut={() => setAuthed(false)} theme={theme} onToggleTheme={() => setTheme(theme === 'light' ? 'dark' : 'light')} />
          {screen}
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
